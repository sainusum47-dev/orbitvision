<!DOCTYPE html>
<html>

<head>

<title>OrbitVision 3D Satellite</title>

<style>

body {
    margin:0;
    overflow:hidden;
    background:black;
}

canvas {
    display:block;
}

</style>

</head>


<body>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>


<script>


// ----------------------
// Scene Setup
// ----------------------

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x020617);



const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);


camera.position.z = 8;



const renderer = new THREE.WebGLRenderer();

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);


document.body.appendChild(renderer.domElement);



// ----------------------
// Earth
// ----------------------

const earthGeometry =
new THREE.SphereGeometry(1.5,64,64);


const earthMaterial =
new THREE.MeshStandardMaterial({

    color:0x1565c0

});


const earth =
new THREE.Mesh(
    earthGeometry,
    earthMaterial
);


scene.add(earth);



// ----------------------
// Satellite Body
// ----------------------

const bodyGeometry =
new THREE.BoxGeometry(
    0.8,
    0.5,
    0.5
);


const bodyMaterial =
new THREE.MeshStandardMaterial({

    color:0xaaaaaa

});


const satellite =
new THREE.Mesh(
    bodyGeometry,
    bodyMaterial
);


satellite.position.set(
    3,
    0,
    0
);


scene.add(satellite);



// ----------------------
// Solar Panels
// ----------------------

const panelGeometry =
new THREE.BoxGeometry(
    1.8,
    0.05,
    0.5
);


const panelMaterial =
new THREE.MeshStandardMaterial({

    color:0x0044ff

});


const panels =
new THREE.Mesh(
    panelGeometry,
    panelMaterial
);


panels.position.set(
    3,
    0,
    0
);


scene.add(panels);



// ----------------------
// Light
// ----------------------

const light =
new THREE.PointLight(
    0xffffff,
    2
);


light.position.set(
    5,
    5,
    5
);


scene.add(light);



const ambient =
new THREE.AmbientLight(
    0xffffff,
    0.5
);


scene.add(ambient);



// ----------------------
// Animation
// ----------------------

function animate(){

requestAnimationFrame(animate);


earth.rotation.y += 0.002;


satellite.rotation.y += 0.02;


renderer.render(
    scene,
    camera
);

}


animate();



</script>


</body>

</html>
